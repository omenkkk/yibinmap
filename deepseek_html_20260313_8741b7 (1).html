        * {

        }
        
        body {
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        
        #map {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            max-width: 280px;
            border-left: 5px solid #e67e22;
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }
        
        .controls h2 {
            margin: 0 0 5px 0;
            color: #2c3e50;
            font-size: 1.5rem;
        }
        
        .total-stats {
            background: #fff5e6;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 15px 0;
            border: 1px solid #ffe0b2;
        }
        
        .total-stats .number {
            font-size: 2.2rem;
            font-weight: bold;
            color: #e67e22;
            line-height: 1;
        }
        
        .legend {
            margin: 15px 0;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px dashed #ecf0f1;
        }
        
        .legend-item:last-child {
            border-bottom: none;
        }
        
        .color-sample {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        
        .region-name {
            flex: 1;
            font-weight: 500;
        }
        
        .street-count {
            background: #ecf0f1;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .btn-reset {
            width: 100%;
            padding: 12px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.2s;
            margin-top: 10px;
        }
        
        .btn-reset:hover {
            background: #d35400;
        }
        
        .note {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-top: 12px;
            text-align: center;
            font-style: italic;
        }
        
        .info-window {
            padding: 12px;
            min-width: 200px;
        }
        
        .info-window h4 {
            margin: 0 0 8px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid;
            font-size: 1.1rem;
        }
        
        .region-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .delivery-note {
            background: #f0f7ff;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #3498db;
            text-align: center;
            margin-top: 8px;
        }
    </style>

        // 修改后的区域范围，南岸右下角往左上移，下江北右下角往左上移

            // 南岸范围：原右下角 (104.675,28.720) → 新右下角 (104.670,28.725)
            new AMap.Polygon({
                map: map,
                path: [
                    [104.605, 28.720],  // 左下
                    [104.670, 28.720],  // 右下 (经度减小，纬度不变？用户要求右下角往左上，所以经度减小、纬度增加)
                    [104.670, 28.770],  // 右上
                    [104.605, 28.770],  // 左上
                    [104.605, 28.720]
                ],
                strokeColor: '#2ecc71',
                strokeWeight: 3,
                strokeOpacity: 0.6,
                fillColor: '#2ecc71',
                fillOpacity: 0.15
            });

            // 老城区范围（不变）
            new AMap.Polygon({
                map: map,
                path: [
                    [104.585, 28.750],
                    [104.640, 28.750],
                    [104.640, 28.785],
                    [104.585, 28.785],
                    [104.585, 28.750]
                ],
                strokeColor: '#e74c3c',
                strokeWeight: 3,
                strokeOpacity: 0.6,
                fillColor: '#e74c3c',
                fillOpacity: 0.15
            });

            // 上江北范围（不变）
            new AMap.Polygon({
                map: map,
                path: [
                    [104.595, 28.770],
                    [104.660, 28.770],
                    [104.660, 28.825],
                    [104.595, 28.825],
                    [104.595, 28.770]
                ],
                strokeColor: '#3498db',
                strokeWeight: 3,
                strokeOpacity: 0.6,
                fillColor: '#3498db',
                fillOpacity: 0.15
            });

            // 下江北范围：原右下角 (104.760,28.750) → 新右下角 (104.755,28.755)
            new AMap.Polygon({
                map: map,
                path: [
                    [104.650, 28.750],  // 左下
                    [104.755, 28.750],  // 右下 (经度减小)
                    [104.755, 28.830],  // 右上 (纬度可调，但用户只要求右下角往左上，我们保持上边界不变？实际上右上角也会相应移动)
                    [104.650, 28.830],  // 左上
                    [104.650, 28.750]
                ],
                strokeColor: '#f39c12',
                strokeWeight: 3,
                strokeOpacity: 0.6,
                fillColor: '#f39c12',
                fillOpacity: 0.15
            });
        }

        function showAllPoints() {
            streetPoints.forEach(point => {
                const markerContent = document.createElement('div');
                markerContent.style.width = '8px';
                markerContent.style.height = '8px';
                markerContent.style.backgroundColor = point.color;
                markerContent.style.borderRadius = '50%';
                markerContent.style.border = '2px solid white';
                markerContent.style.boxShadow = '0 2px 6px rgba(0,0,0,0.3)';
                markerContent.style.cursor = 'pointer';
                
                const marker = new AMap.Marker({
                    position: [point.lng, point.lat],
                    content: markerContent,
                    map: map,
                    title: point.name
                });
                
                marker.on('click', () => {
                    infoWindow.setContent(`
                        <div class="info-window">
                            <h4 style="color: ${point.color}">📍 ${point.name}</h4>
                            <span class="region-badge" style="background: ${point.color}">
                                ${point.region}配送区
                            </span>
                            <div class="delivery-note">
                                🛵 免费配送点位
                            </div>
                        </div>
                    `);
                    infoWindow.open(map, [point.lng, point.lat]);
                });
                
                markers.push(marker);
            });
        }

        function addRiver() {
            new AMap.Polyline({
                path: [
                    [104.600, 28.775],
                    [104.620, 28.773],
                    [104.638, 28.770],
                    [104.660, 28.767],
                    [104.680, 28.764]
                ],
                strokeColor: '#3498db',
                strokeWeight: 3,
                strokeOpacity: 0.3,
                map: map
            });
        }

            if (map) map.setZoomAndCenter(12, [104.641, 28.768], true);
